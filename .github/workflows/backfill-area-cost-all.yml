# 모든 비교 단지의 area-cost 과거 데이터 일괄 백필
# - src/data/real-estate/comparison-targets.json 기반 매트릭스 실행
# - 각 단지당 하나의 runner job (서로 다른 IP, rate-limit 분산 효과)
# - max-parallel로 동시 실행 수 제한 (k-apt 부담 완화)
# - 각 job은 해당 단지의 사용승인월 ~ 전월까지 순차 수집
# - 이미 존재하는 월 스킵, 실패 월은 아티팩트에 기록 (재시도용)
# - 전 job 종료 후 하나의 commit에 모아 giftbott/wooridanji 저장소에 반영
#
# 실행: Actions → "Backfill Area Cost (all comparison complexes)" → Run workflow

name: Backfill Area Cost (all comparison complexes)

on:
  workflow_dispatch:
    inputs:
      exclude:
        description: '제외할 kaptCode (쉼표로 구분). 기본: 힐스테이트송파위례 (별도 실행 중)'
        required: false
        default: 'A10027461'

concurrency:
  group: backfill-all
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.gen.outputs.targets }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: src/data/real-estate/comparison-targets.json
          sparse-checkout-cone-mode: false
      - id: gen
        env:
          EXCLUDE_INPUT: ${{ inputs.exclude }}
        run: |
          TARGETS=$(python3 -c "
          import json, os
          exclude = set(s.strip() for s in os.environ['EXCLUDE_INPUT'].split(',') if s.strip())
          with open('src/data/real-estate/comparison-targets.json') as f:
              all_targets = json.load(f)
          filtered = [t for t in all_targets if t['kaptCode'] not in exclude]
          print(json.dumps(filtered))")
          COUNT=$(echo "$TARGETS" | python3 -c "import json, sys; print(len(json.load(sys.stdin)))")
          echo "targets=$TARGETS" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] 대상 단지: $COUNT개"

  fetch:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        target: ${{ fromJson(needs.setup.outputs.targets) }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate month list
        id: months
        run: |
          START="${{ matrix.target.startMonth }}"
          END=$(TZ=Asia/Seoul date -d '1 month ago' +'%Y%m')
          MONTHS=""
          CUR=$START
          while [ "$CUR" -le "$END" ]; do
            MONTHS="$MONTHS $CUR"
            Y=${CUR:0:4}
            M=${CUR:4:2}
            M=$((10#$M + 1))
            if [ $M -gt 12 ]; then
              M=1; Y=$((Y + 1))
            fi
            CUR=$(printf "%04d%02d" "$Y" "$M")
          done
          COUNT=$(echo $MONTHS | wc -w)
          echo "[INFO] ${{ matrix.target.kaptName }} (${{ matrix.target.kaptCode }}): ${START}~${END} (${COUNT}개월)"
          echo "months=$MONTHS" >> $GITHUB_OUTPUT

      - name: Backfill
        # TELEGRAM 토큰을 일부러 전달하지 않음 → 월별 실패 시 스크린샷 텔레그램 전송 skip
        # (수백 건의 알림 스팸 방지. 실패 월 요약은 commit job에서 한 번만 전송)
        env:
          KAPT: ${{ matrix.target.kaptCode }}
          NAME: ${{ matrix.target.kaptName }}
        run: |
          DIR="src/data/real-estate/area-cost/$KAPT"
          mkdir -p "$DIR" failures

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          RATE_LIMITED=0
          FAIL_LIST=""

          for M in ${{ steps.months.outputs.months }}; do
            TARGET="$DIR/${M}.json"
            if [ -f "$TARGET" ]; then
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            echo ""
            echo "[FETCH] $KAPT $M"
            set +e
            npx tsx scripts/fetch-area-cost.ts --kapt "$KAPT" --name "$NAME" "$M"
            RC=$?
            set -e

            if [ "$RC" -eq 0 ] && [ -f "$TARGET" ]; then
              SUCCESS=$((SUCCESS+1))
              sleep $((RANDOM % 21 + 20))
            elif [ "$RC" -eq 2 ]; then
              # rate-limit: 단지 선택 직후 메인으로 튕김 → 세션 쿨다운 필요
              RATE_LIMITED=$((RATE_LIMITED+1))
              FAILED=$((FAILED+1))
              FAIL_LIST="$FAIL_LIST $M"
              echo "[WARN] rate-limit 감지 (누적 ${RATE_LIMITED}회), 180초 휴식..."
              sleep 180
            else
              FAILED=$((FAILED+1))
              FAIL_LIST="$FAIL_LIST $M"
              sleep $((RANDOM % 21 + 20))
            fi
          done

          echo ""
          echo "=== $NAME ($KAPT) ==="
          echo "성공: $SUCCESS / 스킵: $SKIPPED / 실패: $FAILED (rate-limit: $RATE_LIMITED)"
          [ -n "$FAIL_LIST" ] && echo "실패월:$FAIL_LIST"

          # 실패 기록 (재시도용)
          if [ -n "$FAIL_LIST" ]; then
            echo "$FAIL_LIST" > "failures/${KAPT}.txt"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: backfill-${{ matrix.target.kaptCode }}
          path: |
            src/data/real-estate/area-cost/${{ matrix.target.kaptCode }}/
            failures/${{ matrix.target.kaptCode }}.txt
          retention-days: 14
          if-no-files-found: ignore

  commit:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
      - uses: actions/download-artifact@v4
        with:
          pattern: backfill-*
          merge-multiple: true

      - name: Summarize
        id: summary
        run: |
          TOTAL_FILES=$(find src/data/real-estate/area-cost -name '*.json' -newer .git/HEAD 2>/dev/null | wc -l)
          FAILURE_COUNT=0
          FAILURE_SUMMARY=""
          if [ -d failures ]; then
            for f in failures/*.txt; do
              [ -f "$f" ] || continue
              KAPT=$(basename "$f" .txt)
              MONTHS=$(cat "$f")
              COUNT=$(echo "$MONTHS" | wc -w)
              FAILURE_COUNT=$((FAILURE_COUNT + COUNT))
              FAILURE_SUMMARY="${FAILURE_SUMMARY}\n${KAPT}:${MONTHS}"
            done
          fi
          echo "[요약] 실패 월 총: $FAILURE_COUNT"
          [ -n "$FAILURE_SUMMARY" ] && echo -e "$FAILURE_SUMMARY"
          echo "failure_count=$FAILURE_COUNT" >> $GITHUB_OUTPUT

      - name: Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "[INFO] Telegram token 미설정, 요약 전송 skip"
            exit 0
          fi
          MSG="🗂 비교 단지 area-cost 일괄 백필 완료%0A실패 월 총: ${{ steps.summary.outputs.failure_count }}개"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$MSG"

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: backfill area-cost (비교 단지 일괄)'
          file_pattern: 'src/data/real-estate/area-cost/**/*.json'
