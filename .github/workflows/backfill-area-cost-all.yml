# 모든 비교 단지의 area-cost 과거 데이터 일괄 백필
# - src/data/real-estate/apartments.json 기반 매트릭스 실행
# - 각 단지당 하나의 runner job (서로 다른 IP, rate-limit 분산 효과)
# - max-parallel로 동시 실행 수 제한 (k-apt 부담 완화)
# - 각 job은 해당 단지의 사용승인월 ~ 전월까지 순차 수집
# - 이미 존재하는 월 스킵, 실패 월은 아티팩트에 기록 (재시도용)
# - 전 job 종료 후 하나의 commit에 모아 giftbott/wooridanji 저장소에 반영
#
# 실행: Actions → "Backfill Area Cost (all comparison complexes)" → Run workflow

name: Backfill Area Cost (all comparison complexes)

on:
  workflow_dispatch:
    inputs:
      exclude:
        description: '제외할 kaptCode (쉼표로 구분). 비우면 전 단지 대상.'
        required: false
        default: ''

concurrency:
  group: backfill-all
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.gen.outputs.chunks }}
      count: ${{ steps.gen.outputs.count }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: src/data/real-estate/apartments.json
          sparse-checkout-cone-mode: false
      - id: gen
        env:
          EXCLUDE_INPUT: ${{ inputs.exclude }}
        # 단지 × 연도 조합(chunk)으로 매트릭스 생성.
        # 각 chunk = 서로 다른 runner = 서로 다른 IP → k-apt 누적 rate-limit 효과 분산.
        run: |
          CHUNKS=$(python3 -c "
          import json, os
          from datetime import date
          exclude = set(s.strip() for s in os.environ['EXCLUDE_INPUT'].split(',') if s.strip())
          with open('src/data/real-estate/apartments.json') as f:
              all_targets = json.load(f)
          today = date.today()
          # k-apt 공개 스케줄 기반:
          # - 이달 24일 이전(1~23일): 전전월까지 (예: 4/23 → 202602)
          # - 24일 이후(24~말일): 전월까지 (예: 4/24 → 202603)
          offset = 2 if today.day < 24 else 1
          m = today.month - offset
          y = today.year
          while m <= 0:
              m += 12
              y -= 1
          end_y, end_m = y, m
          # 2년 단위 chunk (runner IP 분산 + matrix 256 한도 준수).
          # 1년 단위면 전체 ~336개로 한도 초과. 2년이면 ~180개 선.
          chunks = []
          YEAR_STEP = 2
          for t in all_targets:
              if t['kaptCode'] in exclude:
                  continue
              # 실제 수집 가능한 시작월 = max(startMonth, occuFirstDate).
              # occuFirstDate 이전은 k-apt에 아예 데이터가 없으므로 시도 자체 생략.
              sm_raw = t['startMonth']
              occu = t.get('occuFirstDate') or sm_raw
              effective_start = max(sm_raw, occu)
              sy, sm = int(effective_start[:4]), int(effective_start[4:])
              # 각 단지별 endMonth가 설정되어 있으면 그것을, 아니면 전역 end_y/end_m 사용.
              apt_end = t.get('endMonth')
              if apt_end:
                  apt_end_y, apt_end_m = int(apt_end[:4]), int(apt_end[4:])
              else:
                  apt_end_y, apt_end_m = end_y, end_m
              y = sy
              while y <= apt_end_y:
                  chunk_end_y = min(y + YEAR_STEP - 1, apt_end_y)
                  start_mm = sm if y == sy else 1
                  end_mm = apt_end_m if chunk_end_y == apt_end_y else 12
                  label = f'{y}' if y == chunk_end_y else f'{y}-{chunk_end_y}'
                  chunks.append({
                      'region': t['region'],
                      'kaptCode': t['kaptCode'],
                      'kaptName': t['kaptName'],
                      'yearLabel': label,
                      'startMonth': f'{y}{start_mm:02d}',
                      'endMonth': f'{chunk_end_y}{end_mm:02d}',
                  })
                  y += YEAR_STEP
          print(json.dumps(chunks, ensure_ascii=False))
          ")
          COUNT=$(echo "$CHUNKS" | python3 -c "import json, sys; print(len(json.load(sys.stdin)))")
          echo "chunks=$CHUNKS" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "[INFO] 대상 chunk: $COUNT개 (단지 × 연도)"

  fetch:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        chunk: ${{ fromJson(needs.setup.outputs.chunks) }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      # Playwright 브라우저 바이너리 캐시 (~200MB, 잡당 1-2분 절약)
      # OS 의존 라이브러리(apt 패키지)는 매번 설치 필요하지만 짧음.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.cache/ms-playwright
          key: pw-browsers-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (full, cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate month list
        id: months
        run: |
          START="${{ matrix.chunk.startMonth }}"
          END="${{ matrix.chunk.endMonth }}"
          MONTHS=""
          CUR=$START
          while [ "$CUR" -le "$END" ]; do
            MONTHS="$MONTHS $CUR"
            Y=${CUR:0:4}
            M=${CUR:4:2}
            M=$((10#$M + 1))
            if [ $M -gt 12 ]; then
              M=1; Y=$((Y + 1))
            fi
            CUR=$(printf "%04d%02d" "$Y" "$M")
          done
          COUNT=$(echo $MONTHS | wc -w)
          echo "[INFO] ${{ matrix.chunk.kaptName }} (${{ matrix.chunk.kaptCode }}) ${{ matrix.chunk.yearLabel }}년: ${START}~${END} (${COUNT}개월)"
          echo "months=$MONTHS" >> $GITHUB_OUTPUT

      - name: Backfill
        # TELEGRAM 토큰을 일부러 전달하지 않음 → 월별 실패 시 스크린샷 텔레그램 전송 skip
        # (수백 건의 알림 스팸 방지. 실패 월 요약은 commit job에서 한 번만 전송)
        env:
          KAPT: ${{ matrix.chunk.kaptCode }}
          NAME: ${{ matrix.chunk.kaptName }}
          YEAR_LABEL: ${{ matrix.chunk.yearLabel }}
        run: |
          DIR="src/data/real-estate/area-cost/$KAPT"
          mkdir -p "$DIR" failures

          SUCCESS=0
          FAILED=0
          SKIPPED=0
          RATE_LIMITED=0
          FAIL_LIST=""

          for M in ${{ steps.months.outputs.months }}; do
            TARGET="$DIR/${M}.json"
            if [ -f "$TARGET" ]; then
              SKIPPED=$((SKIPPED+1))
              continue
            fi
            echo ""
            echo "[FETCH] $KAPT $M"
            set +e
            npx tsx scripts/fetch-area-cost.ts --kapt "$KAPT" --name "$NAME" "$M"
            RC=$?
            set -e

            if [ "$RC" -eq 0 ] && [ -f "$TARGET" ]; then
              SUCCESS=$((SUCCESS+1))
              sleep $((RANDOM % 21 + 20))
            elif [ "$RC" -eq 2 ]; then
              # rate-limit: step 4 후 관리비 페이지로 진입 실패 → 세션 쿨다운
              # 각 단계 대기시간을 늘려 애초에 rate-limit을 덜 타도록 했으므로
              # 쿨다운은 60초로 단축. 여전히 막히면 자연스럽게 반복됨.
              RATE_LIMITED=$((RATE_LIMITED+1))
              FAILED=$((FAILED+1))
              FAIL_LIST="$FAIL_LIST $M"
              echo "[WARN] rate-limit 감지 (누적 ${RATE_LIMITED}회), 60초 휴식..."
              sleep 60
            else
              FAILED=$((FAILED+1))
              FAIL_LIST="$FAIL_LIST $M"
              sleep $((RANDOM % 21 + 20))
            fi
          done

          echo ""
          echo "=== $NAME ($KAPT) ${YEAR_LABEL}년 ==="
          echo "성공: $SUCCESS / 스킵: $SKIPPED / 실패: $FAILED (rate-limit: $RATE_LIMITED)"
          [ -n "$FAIL_LIST" ] && echo "실패월:$FAIL_LIST"

          # 실패 기록 (재시도용) - 같은 단지의 다른 연도 chunk와 충돌 안 나도록 연도 포함
          if [ -n "$FAIL_LIST" ]; then
            echo "$FAIL_LIST" > "failures/${KAPT}-${YEAR_LABEL}.txt"
          fi

      - uses: actions/upload-artifact@v4
        with:
          # 단지×연도 chunk 단위 고유 이름 (동일 단지 여러 잡이 충돌하지 않도록)
          name: backfill-${{ matrix.chunk.kaptCode }}-${{ matrix.chunk.yearLabel }}
          path: |
            src/data/real-estate/area-cost/${{ matrix.chunk.kaptCode }}/
            failures/${{ matrix.chunk.kaptCode }}-${{ matrix.chunk.yearLabel }}.txt
          retention-days: 14
          if-no-files-found: ignore

  commit:
    needs: fetch
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: giftbott/wooridanji
          ref: feat/management-fee-comparison
          token: ${{ secrets.GH_PAT }}
      - uses: actions/download-artifact@v4
        with:
          pattern: backfill-*
          merge-multiple: true

      - name: Summarize
        id: summary
        # 파일명 형식: failures/KAPTCODE-YEAR.txt (예: A10023583-2024.txt)
        run: |
          TOTAL_FILES=$(find src/data/real-estate/area-cost -name '*.json' -newer .git/HEAD 2>/dev/null | wc -l)
          FAILURE_COUNT=0
          FAILURE_SUMMARY=""
          if [ -d failures ]; then
            for f in failures/*.txt; do
              [ -f "$f" ] || continue
              STEM=$(basename "$f" .txt)          # KAPT-YEAR
              MONTHS=$(cat "$f")
              COUNT=$(echo "$MONTHS" | wc -w)
              FAILURE_COUNT=$((FAILURE_COUNT + COUNT))
              FAILURE_SUMMARY="${FAILURE_SUMMARY}\n${STEM}:${MONTHS}"
            done
          fi
          echo "[요약] 실패 월 총: $FAILURE_COUNT"
          [ -n "$FAILURE_SUMMARY" ] && echo -e "$FAILURE_SUMMARY"
          echo "failure_count=$FAILURE_COUNT" >> $GITHUB_OUTPUT

      - name: Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "[INFO] Telegram token 미설정, 요약 전송 skip"
            exit 0
          fi
          MSG="🗂 비교 단지 area-cost 일괄 백필 완료%0A실패 월 총: ${{ steps.summary.outputs.failure_count }}개"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" -d text="$MSG"

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: backfill area-cost (비교 단지 일괄)'
          file_pattern: 'src/data/real-estate/area-cost/**/*.json'
